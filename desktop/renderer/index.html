<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Motivate Me Desktop Pet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="pet-stage">
      <section class="phrase-bubble hidden" id="phrase-bubble" aria-live="polite">
        <div class="bubble-header">
          <p class="bubble-kicker">support bro says</p>
          <button type="button" class="bubble-close" id="close-bubble" aria-label="Close">&#x2715;</button>
        </div>

        <div class="phrase-view" id="phrase-view">
          <p class="bubble-text" id="phrase-text">Need a little push?</p>
          <div class="bubble-footer">
            <span class="tone-pill" id="phrase-tone">warm</span>
            <div class="bubble-actions">
              <button type="button" class="bubble-account" id="account-button">
                connect
              </button>
              <button type="button" class="bubble-refresh" id="refresh-phrase">
                again
              </button>
            </div>
          </div>
        </div>

        <form class="auth-view hidden" id="auth-form">
          <p class="auth-title" id="auth-title">connect account</p>
          <p class="auth-status" id="auth-status">same account, same support</p>

          <div class="auth-fields" id="auth-fields">
            <label class="auth-label" for="auth-email">email</label>
            <input
              class="auth-input"
              id="auth-email"
              type="email"
              placeholder="email"
              autocomplete="email"
              spellcheck="false"
            />

            <label class="auth-label" for="auth-password">password</label>
            <input
              class="auth-input"
              id="auth-password"
              type="password"
              placeholder="password"
              autocomplete="current-password"
            />
          </div>

          <p class="auth-message" id="auth-message" aria-live="polite"></p>

          <div class="auth-actions">
            <button type="button" class="auth-secondary" id="auth-back">
              back
            </button>
            <button type="submit" class="auth-primary" id="auth-submit">
              connect
            </button>
            <button type="button" class="auth-primary hidden" id="auth-logout">
              sign out
            </button>
          </div>
        </form>
      </section>

      <div class="pet-wrap" id="pet-wrap">
        <button type="button" class="pet-shell" id="pet-button" aria-label="Show motivation">
          <span class="pet-shadow" aria-hidden="true"></span>
          <img class="pet-sprite" id="pet-sprite" src="../public/llama/sprite_0.png" alt="" aria-hidden="true" />
        </button>
        <div class="ground-line" aria-hidden="true"></div>
      </div>
    </main>

    <script src="./renderer.js"></script>
  </body>
  </html>
